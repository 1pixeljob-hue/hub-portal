# Triggering redeploy with verified FTP settings
name: Deploy PHP App to cPanel FTP

on:
  push:
    branches:
      - main
      - master # Hỗ trợ cả branch master nếu có

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: / # Thay đổi đường dẫn này nếu thư mục public_html ở vị trí khác (VD: /public_html/link-manager/)
          local-dir: ./ 
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
          dangerous-clean-slate: false
          port: 21
          protocol: ftp
          security: loose
